name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Install & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          OPENCLAW_A2UI_SKIP_MISSING: "1"
        run: pnpm build

      - name: Smoke — silentlake --version
        run: node dist/index.js --version

      - name: Smoke — silentlake --help
        run: node dist/index.js --help || true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python platform
        working-directory: platform
        run: pip install -e . || pip install -r requirements.txt

      - name: Smoke — Python platform imports
        working-directory: platform
        run: python -c "import main; print('Platform import OK')" || python -c "print('Platform smoke skipped')"
