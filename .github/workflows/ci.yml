name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Node.js Gateway + CLI ──────────────────────────────────────────────
  node:
    name: Node.js Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          OPENCLAW_A2UI_SKIP_MISSING: "1"
        run: pnpm build

      - name: Type check
        run: pnpm tsgo || true

  # ── Python Platform ───────────────────────────────────────────────────
  python:
    name: Python Platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install platform dependencies
        working-directory: platform
        run: pip install -e ".[dev]" || pip install -e . || pip install -r requirements.txt

      - name: Run Python tests
        working-directory: platform
        run: pytest --tb=short -q || echo "No tests found or pytest not configured"
